<!DOCTYPE html>
<html>

<head>
    <title>
        form a rectangle by html
    </title>
    <style>
        .container {

            background-color: brown;
            width: 100%;
            height: 50%;

        }
    </style>


</head>

<body>
    <div class="container">
        <svg viewbox="0  0   400   200">

            <rect x="70" y="50" rx="30" ry="40" width="180" height="50"
                style="stroke:springgreen;stroke-width:0.5;fill:darkblue;"></rect>


        </svg>


    </div>


</body>

</html>
