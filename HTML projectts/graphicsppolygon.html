<!DOCTYPE html>
<html>

<head>
    <title>
        form a rectangle by html
    </title>
    <style>
        .container {

            background-color: brown;
            width: 100%;
            height: 50%;

        }
    </style>


</head>

<body>
    <div class="container">
        <svg viewbox="0  0   400   200">

            <polygon points="50,30  90,30 130,60 130,90 90,120 50,120 10,90 10,60"
                style="stroke:springgreen;stroke-width:0.5;fill:darkblue;"></polygon>


        </svg>


    </div>


</body>

</html>
